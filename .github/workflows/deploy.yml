name: Deploy to Cloudflare Pages

# Builds the static site and deploys it to Cloudflare Pages on every push to
# main (including the monthly data-refresh commits). Uses the committed
# web/public/industry_trends.json, so no data fetch is needed here.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build site
        run: |
          npm ci
          npm run build

      # Create the Pages project on first run; harmless no-op once it exists.
      - name: Ensure Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx -y wrangler@3 pages project create hk-vanishing-trades --production-branch=main || true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy web/dist --project-name=hk-vanishing-trades --branch=main --commit-dirty=true
